	<title>Lavado de manos</title>
</head>
<body>
	<h1>Como lavarse las manos?</h1>
	<ol>
		<li>Moja tus manos con agua limpia</li>
		<li>Aplica jabon y frota palmas y dedos</li>
		<li>Frota el dorso de cada mano</li>
		<li>Enjuaga bien con agua</li>
		<li>Seca con una toalla limpia</li>
	</ol>
