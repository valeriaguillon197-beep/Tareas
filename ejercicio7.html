 <h2>Pasos para encender la computadora</h2>
 <ol>
 <li>Conecta el cable de energía al tomacorriente.</li>
 <li>Presiona el botón de encendido del monitor.</li>
 <li>Presiona el botón de encendido del CPU.</li>
 <li>Espera a que cargue el sistema operativo.</li>
 <li>Ingresa tu usuario y contraseña.</li>
